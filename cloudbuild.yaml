steps:
  # ── Phase 0: Tests — fail fast before any image is built ──────────────────
  - name: 'node:20-alpine'
    entrypoint: sh
    args:
      - '-c'
      - 'cd nodejs-backend && npm ci && npm test'
    id: 'test-backend'

  # Run messaging + payments unit/integration tests
  - name: 'node:20-alpine'
    entrypoint: sh
    args:
      - '-c'
      - |
        cd services/messaging-service && npm ci && npx jest --no-coverage --passWithNoTests
        cd ../../services/payments-service && npm ci && npx jest --no-coverage --passWithNoTests
    id: 'test-services'
    waitFor: ['-']     # runs in parallel with test-backend


  # Build Node.js backend Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/infrasells-backend:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/infrasells-backend:latest'
      - './nodejs-backend'
    id: 'build-backend'
    waitFor: ['test-backend', 'test-services']

  # Push backend image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/infrasells-backend:$COMMIT_SHA'
    id: 'push-backend'
    waitFor: ['build-backend']

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/infrasells-backend:latest'
    waitFor: ['push-backend']

  # Deploy backend to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'infrasells-backend'
      - '--image=gcr.io/$PROJECT_ID/infrasells-backend:$COMMIT_SHA'
      - '--region=us-central1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--port=8000'
      - '--memory=1Gi'
      - '--cpu=2'
      - '--min-instances=1'
      - '--max-instances=20'
      - '--concurrency=80'
      - '--cpu-boost'
      - '--set-env-vars=NODE_ENV=production'
      - '--add-cloudsql-instances=$_CLOUD_SQL_CONNECTION_NAME'
      - '--set-secrets=DATABASE_URL=DATABASE_URL:latest,FIREBASE_PROJECT_ID=FIREBASE_PROJECT_ID:latest,FIREBASE_CLIENT_EMAIL=FIREBASE_CLIENT_EMAIL:latest,FIREBASE_PRIVATE_KEY=FIREBASE_PRIVATE_KEY:latest,FIREBASE_STORAGE_BUCKET=FIREBASE_STORAGE_BUCKET:latest,GCS_BUCKET=GCS_BUCKET:latest,REDIS_URL=REDIS_URL:latest,STRIPE_SECRET_KEY=STRIPE_SECRET_KEY:latest,STRIPE_WEBHOOK_SECRET=STRIPE_WEBHOOK_SECRET:latest,MPESA_CONSUMER_KEY=MPESA_CONSUMER_KEY:latest,MPESA_CONSUMER_SECRET=MPESA_CONSUMER_SECRET:latest,MPESA_PASSKEY=MPESA_PASSKEY:latest,SENTRY_DSN=SENTRY_DSN:latest'
    id: 'deploy-backend'
    waitFor: ['push-backend']

  # Install Next.js deps and build
  - name: 'node:20-alpine'
    entrypoint: sh
    args:
      - '-c'
      - 'cd nextjs-frontend && npm ci && npm run build'
    id: 'build-frontend'

  # ── Messaging service ─────────────────────────────────────────────────────────

  # Build messaging-service Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/infrasells-messaging:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/infrasells-messaging:latest'
      - './services/messaging-service'
    id: 'build-messaging'
    waitFor: ['test-backend', 'test-services']
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/infrasells-messaging:$COMMIT_SHA']
    id: 'push-messaging'
    waitFor: ['build-messaging']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/infrasells-messaging:latest']
    waitFor: ['push-messaging']

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'infrasells-messaging'
      - '--image=gcr.io/$PROJECT_ID/infrasells-messaging:$COMMIT_SHA'
      - '--region=us-central1'
      - '--platform=managed'
      - '--no-allow-unauthenticated'
      - '--port=8001'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--min-instances=1'
      - '--max-instances=50'
      - '--concurrency=100'
      - '--cpu-boost'
      - '--set-env-vars=NODE_ENV=production'
      - '--set-secrets=FIREBASE_PROJECT_ID=FIREBASE_PROJECT_ID:latest,FIREBASE_CLIENT_EMAIL=FIREBASE_CLIENT_EMAIL:latest,FIREBASE_PRIVATE_KEY=FIREBASE_PRIVATE_KEY:latest,REDIS_URL=REDIS_URL:latest'
    id: 'deploy-messaging'
    waitFor: ['push-messaging']

  # ── Payments service ──────────────────────────────────────────────────────────

  # Build payments-service Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/infrasells-payments:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/infrasells-payments:latest'
      - './services/payments-service'
    id: 'build-payments'
    waitFor: ['test-backend', 'test-services']
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/infrasells-payments:$COMMIT_SHA']
    id: 'push-payments'
    waitFor: ['build-payments']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/infrasells-payments:latest']
    waitFor: ['push-payments']

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'infrasells-payments'
      - '--image=gcr.io/$PROJECT_ID/infrasells-payments:$COMMIT_SHA'
      - '--region=us-central1'
      - '--platform=managed'
      - '--ingress=internal-and-cloud-load-balancing'
      - '--port=8002'
      - '--memory=256Mi'
      - '--cpu=1'
      - '--min-instances=1'
      - '--max-instances=5'
      - '--concurrency=20'
      - '--cpu-boost'
      - '--set-env-vars=NODE_ENV=production'
      - '--set-secrets=REDIS_URL=REDIS_URL:latest,STRIPE_SECRET_KEY=STRIPE_SECRET_KEY:latest,STRIPE_WEBHOOK_SECRET=STRIPE_WEBHOOK_SECRET:latest,MPESA_CONSUMER_KEY=MPESA_CONSUMER_KEY:latest,MPESA_CONSUMER_SECRET=MPESA_CONSUMER_SECRET:latest,MPESA_CALLBACK_IPS=MPESA_CALLBACK_IPS:latest,PAYPAL_CLIENT_ID=PAYPAL_CLIENT_ID:latest,PAYPAL_CLIENT_SECRET=PAYPAL_CLIENT_SECRET:latest'
    id: 'deploy-payments'
    waitFor: ['push-payments']

  # ── Users service ─────────────────────────────────────────────────────────────

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/infrasells-users:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/infrasells-users:latest'
      - '-f'
      - 'services/users-service/Dockerfile'
      - '.'
    id: 'build-users'
    waitFor: ['test-backend', 'test-services']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/infrasells-users:$COMMIT_SHA']
    id: 'push-users'
    waitFor: ['build-users']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/infrasells-users:latest']
    waitFor: ['push-users']

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'infrasells-users'
      - '--image=gcr.io/$PROJECT_ID/infrasells-users:$COMMIT_SHA'
      - '--region=us-central1'
      - '--platform=managed'
      - '--no-allow-unauthenticated'
      - '--port=8003'
      - '--memory=256Mi'
      - '--cpu=1'
      - '--min-instances=1'
      - '--max-instances=10'
      - '--concurrency=50'
      - '--cpu-boost'
      - '--set-env-vars=NODE_ENV=production'
      - '--add-cloudsql-instances=$_CLOUD_SQL_CONNECTION_NAME'
      - '--set-secrets=DATABASE_URL=DATABASE_URL:latest,FIREBASE_PROJECT_ID=FIREBASE_PROJECT_ID:latest,FIREBASE_CLIENT_EMAIL=FIREBASE_CLIENT_EMAIL:latest,FIREBASE_PRIVATE_KEY=FIREBASE_PRIVATE_KEY:latest,REDIS_URL=REDIS_URL:latest'
    id: 'deploy-users'
    waitFor: ['push-users']

  # ── Jobs service ──────────────────────────────────────────────────────────────

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/infrasells-jobs:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/infrasells-jobs:latest'
      - '-f'
      - 'services/jobs-service/Dockerfile'
      - '.'
    id: 'build-jobs'
    waitFor: ['test-backend', 'test-services']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/infrasells-jobs:$COMMIT_SHA']
    id: 'push-jobs'
    waitFor: ['build-jobs']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/infrasells-jobs:latest']
    waitFor: ['push-jobs']

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'infrasells-jobs'
      - '--image=gcr.io/$PROJECT_ID/infrasells-jobs:$COMMIT_SHA'
      - '--region=us-central1'
      - '--platform=managed'
      - '--no-allow-unauthenticated'
      - '--port=8004'
      - '--memory=256Mi'
      - '--cpu=1'
      - '--min-instances=1'
      - '--max-instances=10'
      - '--concurrency=80'
      - '--cpu-boost'
      - '--set-env-vars=NODE_ENV=production'
      - '--add-cloudsql-instances=$_CLOUD_SQL_CONNECTION_NAME'
      - '--set-secrets=DATABASE_URL=DATABASE_URL:latest,FIREBASE_PROJECT_ID=FIREBASE_PROJECT_ID:latest,FIREBASE_CLIENT_EMAIL=FIREBASE_CLIENT_EMAIL:latest,FIREBASE_PRIVATE_KEY=FIREBASE_PRIVATE_KEY:latest,REDIS_URL=REDIS_URL:latest'
    id: 'deploy-jobs'
    waitFor: ['push-jobs']

  # ── Project service ───────────────────────────────────────────────────────────

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/infrasells-project:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/infrasells-project:latest'
      - '-f'
      - 'services/project-service/Dockerfile'
      - '.'
    id: 'build-project'
    waitFor: ['test-backend', 'test-services']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/infrasells-project:$COMMIT_SHA']
    id: 'push-project'
    waitFor: ['build-project']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/infrasells-project:latest']
    waitFor: ['push-project']

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'infrasells-project'
      - '--image=gcr.io/$PROJECT_ID/infrasells-project:$COMMIT_SHA'
      - '--region=us-central1'
      - '--platform=managed'
      - '--no-allow-unauthenticated'
      - '--port=8005'
      - '--memory=256Mi'
      - '--cpu=1'
      - '--min-instances=1'
      - '--max-instances=10'
      - '--concurrency=50'
      - '--cpu-boost'
      - '--set-env-vars=NODE_ENV=production'
      - '--add-cloudsql-instances=$_CLOUD_SQL_CONNECTION_NAME'
      - '--set-secrets=DATABASE_URL=DATABASE_URL:latest,FIREBASE_PROJECT_ID=FIREBASE_PROJECT_ID:latest,FIREBASE_CLIENT_EMAIL=FIREBASE_CLIENT_EMAIL:latest,FIREBASE_PRIVATE_KEY=FIREBASE_PRIVATE_KEY:latest,REDIS_URL=REDIS_URL:latest'
    id: 'deploy-project'
    waitFor: ['push-project']

  # ── Notifications service ─────────────────────────────────────────────────────

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/infrasells-notifications:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/infrasells-notifications:latest'
      - './services/notifications-service'
    id: 'build-notifications'
    waitFor: ['test-backend', 'test-services']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/infrasells-notifications:$COMMIT_SHA']
    id: 'push-notifications'
    waitFor: ['build-notifications']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/infrasells-notifications:latest']
    waitFor: ['push-notifications']

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'infrasells-notifications'
      - '--image=gcr.io/$PROJECT_ID/infrasells-notifications:$COMMIT_SHA'
      - '--region=us-central1'
      - '--platform=managed'
      - '--no-allow-unauthenticated'
      - '--port=8006'
      - '--memory=256Mi'
      - '--cpu=1'
      - '--min-instances=1'
      - '--max-instances=10'
      - '--concurrency=50'
      - '--cpu-boost'
      - '--set-env-vars=NODE_ENV=production'
      - '--set-secrets=FIREBASE_PROJECT_ID=FIREBASE_PROJECT_ID:latest,FIREBASE_CLIENT_EMAIL=FIREBASE_CLIENT_EMAIL:latest,FIREBASE_PRIVATE_KEY=FIREBASE_PRIVATE_KEY:latest'
    id: 'deploy-notifications'
    waitFor: ['push-notifications']

  # ── Reviews service ───────────────────────────────────────────────────────────

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/infrasells-reviews:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/infrasells-reviews:latest'
      - './services/reviews-service'
    id: 'build-reviews'
    waitFor: ['test-backend', 'test-services']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/infrasells-reviews:$COMMIT_SHA']
    id: 'push-reviews'
    waitFor: ['build-reviews']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/infrasells-reviews:latest']
    waitFor: ['push-reviews']

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'infrasells-reviews'
      - '--image=gcr.io/$PROJECT_ID/infrasells-reviews:$COMMIT_SHA'
      - '--region=us-central1'
      - '--platform=managed'
      - '--no-allow-unauthenticated'
      - '--port=8007'
      - '--memory=256Mi'
      - '--cpu=1'
      - '--min-instances=0'
      - '--max-instances=5'
      - '--concurrency=50'
      - '--cpu-boost'
      - '--set-env-vars=NODE_ENV=production'
      - '--set-secrets=FIREBASE_PROJECT_ID=FIREBASE_PROJECT_ID:latest,FIREBASE_CLIENT_EMAIL=FIREBASE_CLIENT_EMAIL:latest,FIREBASE_PRIVATE_KEY=FIREBASE_PRIVATE_KEY:latest'
    id: 'deploy-reviews'
    waitFor: ['push-reviews']

  # ── Search service ────────────────────────────────────────────────────────────

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/infrasells-search:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/infrasells-search:latest'
      - './services/search-service'
    id: 'build-search'
    waitFor: ['test-backend', 'test-services']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/infrasells-search:$COMMIT_SHA']
    id: 'push-search'
    waitFor: ['build-search']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/infrasells-search:latest']
    waitFor: ['push-search']

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'infrasells-search'
      - '--image=gcr.io/$PROJECT_ID/infrasells-search:$COMMIT_SHA'
      - '--region=us-central1'
      - '--platform=managed'
      - '--no-allow-unauthenticated'
      - '--port=8008'
      - '--memory=256Mi'
      - '--cpu=1'
      - '--min-instances=0'
      - '--max-instances=5'
      - '--concurrency=50'
      - '--cpu-boost'
      - '--set-env-vars=NODE_ENV=production'
      - '--set-secrets=FIREBASE_PROJECT_ID=FIREBASE_PROJECT_ID:latest,FIREBASE_CLIENT_EMAIL=FIREBASE_CLIENT_EMAIL:latest,FIREBASE_PRIVATE_KEY=FIREBASE_PRIVATE_KEY:latest'
    id: 'deploy-search'
    waitFor: ['push-search']

  # ── Subscriptions service ─────────────────────────────────────────────────────

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/infrasells-subscriptions:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/infrasells-subscriptions:latest'
      - './services/subscriptions-service'
    id: 'build-subscriptions'
    waitFor: ['test-backend', 'test-services']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/infrasells-subscriptions:$COMMIT_SHA']
    id: 'push-subscriptions'
    waitFor: ['build-subscriptions']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/infrasells-subscriptions:latest']
    waitFor: ['push-subscriptions']

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'infrasells-subscriptions'
      - '--image=gcr.io/$PROJECT_ID/infrasells-subscriptions:$COMMIT_SHA'
      - '--region=us-central1'
      - '--platform=managed'
      - '--no-allow-unauthenticated'
      - '--port=8009'
      - '--memory=256Mi'
      - '--cpu=1'
      - '--min-instances=0'
      - '--max-instances=5'
      - '--concurrency=50'
      - '--cpu-boost'
      - '--set-env-vars=NODE_ENV=production'
      - '--set-secrets=FIREBASE_PROJECT_ID=FIREBASE_PROJECT_ID:latest,FIREBASE_CLIENT_EMAIL=FIREBASE_CLIENT_EMAIL:latest,FIREBASE_PRIVATE_KEY=FIREBASE_PRIVATE_KEY:latest'
    id: 'deploy-subscriptions'
    waitFor: ['push-subscriptions']

  # ── Tools service ─────────────────────────────────────────────────────────────

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/infrasells-tools:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/infrasells-tools:latest'
      - './services/tools-service'
    id: 'build-tools'
    waitFor: ['test-backend', 'test-services']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/infrasells-tools:$COMMIT_SHA']
    id: 'push-tools'
    waitFor: ['build-tools']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/infrasells-tools:latest']
    waitFor: ['push-tools']

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'infrasells-tools'
      - '--image=gcr.io/$PROJECT_ID/infrasells-tools:$COMMIT_SHA'
      - '--region=us-central1'
      - '--platform=managed'
      - '--no-allow-unauthenticated'
      - '--port=8010'
      - '--memory=256Mi'
      - '--cpu=1'
      - '--min-instances=0'
      - '--max-instances=5'
      - '--concurrency=50'
      - '--cpu-boost'
      - '--set-env-vars=NODE_ENV=production'
      - '--set-secrets=FIREBASE_PROJECT_ID=FIREBASE_PROJECT_ID:latest,FIREBASE_CLIENT_EMAIL=FIREBASE_CLIENT_EMAIL:latest,FIREBASE_PRIVATE_KEY=FIREBASE_PRIVATE_KEY:latest'
    id: 'deploy-tools'
    waitFor: ['push-tools']

  # ── Phase 6: Staged traffic cut-over (safe rollout) ───────────────────────────
  # Each service was deployed above without changing traffic (Cloud Run keeps
  # serving the previous revision until traffic is explicitly updated).
  # This step migrates all services to the new revision atomically once ALL
  # deploy steps have succeeded.
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: bash
    args:
      - '-c'
      - |
        set -euo pipefail
        REGION=us-central1
        PROJECT=$PROJECT_ID
        for SERVICE in \
          infrasells-backend \
          infrasells-messaging \
          infrasells-payments \
          infrasells-users \
          infrasells-jobs \
          infrasells-project \
          infrasells-notifications \
          infrasells-reviews \
          infrasells-search \
          infrasells-subscriptions \
          infrasells-tools; do
          echo "→ Migrating traffic: $SERVICE"
          gcloud run services update-traffic "$SERVICE" \
            --to-latest \
            --region="$REGION" \
            --project="$PROJECT" \
            --quiet
        done
        echo "✅ All services now serving latest revision"
    id: 'migrate-traffic'
    waitFor:
      - 'deploy-backend'
      - 'deploy-messaging'
      - 'deploy-payments'
      - 'deploy-users'
      - 'deploy-jobs'
      - 'deploy-project'
      - 'deploy-notifications'
      - 'deploy-reviews'
      - 'deploy-search'
      - 'deploy-subscriptions'
      - 'deploy-tools'

  # Deploy Next.js to Firebase Hosting (using firebase CLI via npx)
  - name: 'node:20-alpine'
    entrypoint: sh
    args:
      - '-c'
      - 'cd nextjs-frontend && npx --yes firebase-tools deploy --only hosting --project $PROJECT_ID --token $$FIREBASE_TOKEN'
    secretEnv: ['FIREBASE_TOKEN']
    id: 'deploy-frontend'
    waitFor: ['build-frontend']

